# Copy this file locally and replace the placeholders with your own tunnel
# UUID, credentials file, and hostname.
tunnel: YOUR_TUNNEL_UUID
credentials-file: /path/to/your/cloudflared-credentials.json

ingress:
  - hostname: your-site.example
    path: /api/.*
    service: http://127.0.0.1:3015
  - hostname: your-site.example
    service: http://127.0.0.1:3000
  - service: http_status:404
